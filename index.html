<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Golf Score System</title>

<style>

body{
  margin:0;
  padding:0;
  font-family:Arial;
  background:#0f2d1a;
  color:white;
}

.container{
  max-width:1000px;
  margin:auto;
  padding:20px;
}

.card{
  background:white;
  color:black;
  border-radius:20px;
  padding:20px;
  margin-bottom:20px;
}

h1,h2{
  margin-top:0;
}

button{
  border:none;
  border-radius:12px;
  padding:12px 18px;
  cursor:pointer;
  font-size:16px;
  font-weight:bold;
  margin-right:10px;
}

.btn-green{
  background:#1f6f43;
  color:white;
}

.btn-red{
  background:#d64545;
  color:white;
}

.score-grid{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:12px;
}

.hole{
  background:#f5f5f5;
  border-radius:12px;
  padding:10px;
  text-align:center;
}

.hole input{
  width:60px;
  font-size:20px;
  text-align:center;
  margin-top:8px;
}

.rank-row{
  display:flex;
  justify-content:space-between;
  padding:12px;
  border-bottom:1px solid #ddd;
}

.total-box{
  font-size:24px;
  font-weight:bold;
  margin-top:20px;
}

@media(max-width:768px){

.score-grid{
  grid-template-columns:repeat(3,1fr);
}

}

</style>
</head>

<body>

<div class="container">

<div class="card">

<h1>⛳ 高爾夫即時計分系統</h1>

<button class="btn-green" onclick="loginGoogle()">
Google 登入
</button>

<button class="btn-red" onclick="logoutUser()">
登出
</button>

<p id="user-info">
尚未登入
</p>

</div>

<div class="card">

<h2>🏌️ 我的成績</h2>

<div class="score-grid" id="score-grid"></div>

<div class="total-box">
總桿：<span id="total-score">72</span>
</div>

<br>

<button class="btn-green" onclick="saveScores()">
儲存成績
</button>

</div>

<div class="card">

<h2>🏆 即時排行榜</h2>

<div id="ranking"></div>

</div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";

import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup,
  signOut,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import {
  getDatabase,
  ref,
  set,
  onValue
}
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";



// Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries


// Your web app's Firebase configuration

// Initialize Firebase
const app = initializeApp(firebaseConfig);



const firebaseConfig = {
  apiKey: "AIzaSyDLSW6Q04KPooiCj2yUpVLzdvdDQD59Q3Y",
  authDomain: "golf-score-a6108.firebaseapp.com",
  databaseURL: "https://golf-score-a6108-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "golf-score-a6108",
  storageBucket: "golf-score-a6108.firebasestorage.app",
  messagingSenderId: "607069073537",
  appId: "1:607069073537:web:24e3235c554645a392dd80"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

const db = getDatabase(app);

let currentUser = null;

const grid = document.getElementById("score-grid");

for(let i=0;i<18;i++){

  grid.innerHTML += `
  
  <div class="hole">

    <div>第 ${i+1} 洞</div>

    <input
      type="number"
      id="hole-${i}"
      value="4"
      min="1"
      onchange="calcTotal()"
    >

  </div>
  
  `;
}

window.calcTotal = function(){

  let total = 0;

  for(let i=0;i<18;i++){

    total += parseInt(
      document.getElementById(`hole-${i}`).value
    ) || 0;
  }

  document.getElementById("total-score").innerText = total;
}

window.loginGoogle = async function(){

  try{

    await signInWithPopup(auth, provider);

  }catch(err){

    alert(err.message);
  }
}

window.logoutUser = async function(){

  await signOut(auth);
}

onAuthStateChanged(auth,(user)=>{

  currentUser = user;

  if(user){

    document.getElementById("user-info").innerHTML = `
    
      👤 ${user.displayName}
    
    `;

  }else{

    document.getElementById("user-info").innerHTML = `
    
      尚未登入
    
    `;
  }
});

window.saveScores = async function(){

  if(!currentUser){

    alert("請先登入");

    return;
  }

  const scores = [];

  for(let i=0;i<18;i++){

    scores.push(
      parseInt(
        document.getElementById(`hole-${i}`).value
      ) || 0
    );
  }

  const total = scores.reduce((a,b)=>a+b,0);

  await set(

    ref(db,"scores/"+currentUser.uid),

    {
      uid: currentUser.uid,
      name: currentUser.displayName,
      scores: scores,
      total: total,
      updatedAt: Date.now()
    }

  );

  alert("成績已儲存！");
}

onValue(ref(db,"scores"),(snap)=>{

  const data = snap.val();

  if(!data){

    document.getElementById("ranking").innerHTML = `
      尚無資料
    `;

    return;
  }

  const players = Object.values(data)
    .sort((a,b)=>a.total-b.total);

  document.getElementById("ranking").innerHTML = players.map((p,i)=>`

    <div class="rank-row">

      <div>
        ${i+1}. ${p.name}
      </div>

      <div>
        ${p.total}
      </div>

    </div>

  `).join("");

});

calcTotal();

</script>

</body>
</html>
