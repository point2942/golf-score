<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Golf Score System</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0f2d1a, #14532d);
      color: white;
    }

    .container {
      max-width: 1000px;
      margin: auto;
      padding: 20px;
    }

    .card {
      background: white;
      color: black;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    h1, h2 {
      margin-top: 0;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 12px 18px;
      cursor: pointer;
      font-size: 16px;
      font-weight: bold;
      margin-right: 10px;
      margin-bottom: 10px;
    }

    .btn-green {
      background: #1f6f43;
      color: white;
    }

    .btn-red {
      background: #d64545;
      color: white;
    }

    .score-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 12px;
    }

    .hole {
      background: #f5f5f5;
      border-radius: 12px;
      padding: 10px;
      text-align: center;
    }

    .hole input {
      width: 60px;
      font-size: 20px;
      text-align: center;
      margin-top: 8px;
      padding: 6px;
    }

    .rank-row {
      display: flex;
      justify-content: space-between;
      padding: 12px;
      border-bottom: 1px solid #ddd;
    }

    .total-box {
      font-size: 28px;
      font-weight: bold;
      margin-top: 20px;
    }

    @media(max-width:768px){
      .score-grid {
        grid-template-columns: repeat(3,1fr);
      }
    }
  </style>
</head>
<body>

<div class="container">

  <div class="card">

    <h1>⛳ 高爾夫即時計分系統</h1>

    <p id="user-info">🏌️ 開放輸入模式（免登入）</p>

  </div>

  <div class="card">

    <h2>🏌️ 我的成績</h2>

    <div class="score-grid" id="score-grid"></div>

    <div class="total-box">
      總桿：<span id="total-score">72</span>
    </div>

    <br>

    <button class="btn-green" id="saveBtn">
      儲存成績
    </button>

  </div>

  <div class="card">

    <h2>🏆 即時排行榜</h2>

    <div id="ranking">尚無資料</div>

  </div>

</div>

<script type="module">



import {
  getDatabase,
  ref,
  set,
  onValue
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDLSW6Q04KPooiCj2yUpVLzdvdDQD59Q3Y",
  authDomain: "golf-score-a6108.firebaseapp.com",
  databaseURL: "https://golf-score-a6108-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "golf-score-a6108",
  storageBucket: "golf-score-a6108.appspot.com",
  messagingSenderId: "607069073537",
  appId: "1:607069073537:web:24e3235c554645a392dd80"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);



const grid = document.getElementById("score-grid");

for(let i = 0; i < 18; i++) {

  grid.innerHTML += `
    <div class="hole">
      <div>第 ${i + 1} 洞</div>
      <input type="number" id="hole-${i}" value="4" min="1">
    </div>
  `;
}

function calcTotal() {

  let total = 0;

  for(let i = 0; i < 18; i++) {

    total += parseInt(document.getElementById(`hole-${i}`).value) || 0;
  }

  document.getElementById("total-score").innerText = total;
}

document.addEventListener("input", calcTotal);





document.getElementById("saveBtn")
.addEventListener("click", async () => {

  const playerName = prompt("請輸入球友姓名");

  if(!playerName){
    alert("請輸入姓名");
    return;
  }

  const scores = [];

  for(let i = 0; i < 18; i++) {

    scores.push(
      parseInt(document.getElementById(`hole-${i}`).value) || 0
    );
  }

  const total = scores.reduce((a,b) => a + b, 0);

  await set(
    ref(db, "scores/" + Date.now()),
    {
      name: playerName,
      scores: scores,
      total: total,
      updatedAt: Date.now()
    }
  );

  alert("成績已儲存！");
});

onValue(ref(db, "scores"), (snap) => {

  const data = snap.val();

  if(!data) {

    document.getElementById("ranking")
    .innerHTML = "尚無資料";

    return;
  }

  const players = Object.values(data)
  .sort((a,b) => a.total - b.total);

  document.getElementById("ranking")
  .innerHTML = players.map((p,i) => `

    <div class="rank-row">
      <div>${i + 1}. ${p.name}</div>
      <div>${p.total}</div>
    </div>

  `).join("");
});

calcTotal();

</script>

</body>
</html>
